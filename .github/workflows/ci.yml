name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        run: pytest -q --tb=short

      - name: Verify catalog in wheel
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: |
          python -m pip install build
          python -m build --wheel
          python -c "
          import zipfile, glob, sys
          for whl in glob.glob('dist/*.whl'):
              with zipfile.ZipFile(whl) as z:
                  names = z.namelist()
                  assert any('effects_catalog.json' in n for n in names), 'effects_catalog.json missing'
                  assert any('effect_mapping.json' in n for n in names), 'effect_mapping.json missing'
                  print('catalog files present in wheel')
          "

      - name: Verify CLI surface
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: |
          COUNT=$(text-fx list | wc -l)
          test "$COUNT" = "120" || (echo "Expected 120 effects, got $COUNT" && exit 1)
          CAT_COUNT=$(text-fx categories | wc -l)
          test "$CAT_COUNT" = "6" || (echo "Expected 6 categories, got $CAT_COUNT" && exit 1)
